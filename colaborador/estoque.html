<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Estoque - AD Canoas</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: radial-gradient(circle at top center, #fff4ef 0%, transparent 35%),
                        linear-gradient(135deg, #f7cdd7 0%, #f9d8cf 25%, #f6d8e8 50%, #f8c9da 75%, #f7e2a6 100%);
            background-attachment: fixed;
            min-height: 100vh;
        }

        .topo {
            background: linear-gradient(135deg, #f5a623, #f8c471);
            padding: 1rem 0;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 20px;
        }

        .menu-topo {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logo-area img {
            max-width: 50px;
            height: auto;
            border-radius: 50%;
        }

        .logo-texto {
            font-size: 1rem;
            font-weight: bold;
            color: #8E2B6D;
        }

        .menu-links {
            display: flex;
            gap: 20px;
            align-items: center;
        }

        .menu-links a {
            color: #8E2B6D;
            text-decoration: none;
            font-weight: 600;
            padding: 8px 15px;
            background: rgba(255,255,255,0.3);
            border-radius: 8px;
            transition: all 0.3s;
        }

        .menu-links a:hover {
            background: rgba(255,255,255,0.6);
            transform: translateY(-2px);
        }

        .btn-sair {
            background: #dc3545;
            color: white !important;
        }

        .btn-sair:hover {
            background: #c82333 !important;
        }

        .titulo-colaborador {
            text-align: center;
            padding: 20px 0;
            color: #d35400;
            font-size: 1.5rem;
        }

        .grid-estoque {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin: 30px 0;
        }

        .card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 1.5rem;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        .card h3 {
            color: #d35400;
            margin-bottom: 1.5rem;
            font-size: 1.3rem;
            border-bottom: 2px solid #f5a623;
            padding-bottom: 0.5rem;
        }

        .data-input {
            margin-bottom: 1.5rem;
        }

        .data-input label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: #333;
        }

        .data-input input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 1rem;
        }

        .item-linha {
            display: flex;
            gap: 10px;
            margin-bottom: 1rem;
            align-items: center;
        }

        .item-linha select {
            flex: 2;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 1rem;
        }

        .item-linha input {
            flex: 1;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 1rem;
        }

        .item-linha button {
            background: #28a745;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }

        .item-linha button:hover {
            background: #218838;
        }

        .lista-itens-adicionados {
            margin: 20px 0;
            max-height: 200px;
            overflow-y: auto;
        }

        .item-adicionado {
            background: #f8f9fa;
            padding: 8px 12px;
            margin: 5px 0;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .btn-remover {
            background: #dc3545;
            color: white;
            border: none;
            padding: 4px 10px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.8rem;
        }

        .btn-enviar {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #f5a623, #f8c471);
            color: #8E2B6D;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 1rem;
        }

        .btn-enviar:hover {
            transform: translateY(-2px);
        }

        .tabela-estoque {
            width: 100%;
            border-collapse: collapse;
        }

        .tabela-estoque th,
        .tabela-estoque td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }

        .tabela-estoque th {
            background: #f5a623;
            color: white;
            font-weight: bold;
        }

        .tabela-estoque tr:hover {
            background: rgba(245, 166, 35, 0.1);
        }

        .quantidade-zero {
            color: #999;
        }

        @media (max-width: 900px) {
            .grid-estoque {
                grid-template-columns: 1fr;
                gap: 20px;
            }
        }
    </style>
</head>
<body>

<div class="topo">
    <div class="container">
        <div class="menu-topo">
            <div class="logo-area">
                <img src="../imagens/logoigreja.jpg" alt="Logo" onerror="this.src='https://via.placeholder.com/50'">
                <div class="logo-texto">
                    AD Canoas<br>
                    <small>Matriz Niterói</small>
                </div>
            </div>
            <div class="menu-links">
                <a href="../index.html">🏠 Início</a>
                <a href="#" onclick="logout()" class="btn-sair">🚪 Sair</a>
            </div>
        </div>
    </div>
</div>

<div class="container">
    <div class="titulo-colaborador" id="tituloBoasVindas">
        👋 Olá, <span id="nomeColaborador">Carregando...</span>!
    </div>

    <div class="grid-estoque">
        <!-- COLUNA ESQUERDA: Registrar Movimentação -->
        <div class="card">
            <h3>📅 Registrar Movimentação</h3>
            
            <div class="data-input">
                <label>📆 Data da Movimentação</label>
                <input type="date" id="dataMovimentacao" value="">
            </div>
            
            <div class="item-linha">
                <select id="itemSelect" onchange="toggleOutroItem()">
                    <option value="">Selecione um item...</option>
                    <option value="Arroz">🍚 Arroz</option>
                    <option value="Feijão">🫘 Feijão</option>
                    <option value="Macarrão">🍝 Macarrão</option>
                    <option value="Farinha">🌾 Farinha</option>
                    <option value="Açúcar">🍬 Açúcar</option>
                    <option value="Óleo">🫒 Óleo</option>
                    <option value="Leite">🥛 Leite</option>
                    <option value="Café">☕ Café</option>
                    <option value="Carne">🥩 Carne</option>
                    <option value="Frango">🍗 Frango</option>
                    <option value="Verdura">🥬 Verdura</option>
                    <option value="outro">📝 Outro (digite abaixo)</option>
                </select>
                <input type="number" id="quantidadeItem" placeholder="Qtde" step="0.1">
                <select id="tipoMovimentacao" style="width: auto;">
                    <option value="entrada">➕ Entrada</option>
                    <option value="saida">➖ Saída</option>
                </select>
                <button onclick="adicionarItemLista()">+</button>
            </div>
            
            <!-- Campo para digitar outro item -->
            <div id="outroItemDiv" style="display: none; margin-bottom: 1rem;">
                <label style="display: block; margin-bottom: 0.5rem; font-weight: 600; color: #333;">📝 Digite o nome do item:</label>
                <input type="text" id="outroItemInput" placeholder="Ex: Biscoito, Suco, Sabonete..." style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px;">
            </div>
            
            <div class="lista-itens-adicionados" id="listaItensTemp">
                <p style="color: #888; text-align: center;">Nenhum item adicionado</p>
            </div>
            
            <button class="btn-enviar" onclick="enviarMovimentacao()">
                📤 ENVIAR PARA PLANILHA
            </button>
        </div>

        <!-- COLUNA DIREITA: Estoque Atual -->
        <div class="card">
            <h3>📦 ITENS EM ESTOQUE</h3>
            <div style="max-height: 500px; overflow-y: auto;">
                <table class="tabela-estoque" id="tabelaEstoque">
                    <thead>
                        <tr><th>Item</th><th>Quantidade</th></tr>
                    </thead>
                    <tbody id="estoqueBody">
                        <tr><td colspan="2">Carregando...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script>
// ⚠️ URL ÚNICA UNIFICADA ⚠️
const API_URL = 'https://script.google.com/macros/s/AKfycbyj8auTTbZw93mcO5HCew90NW3C9T8XzgtozcETnxBeyyAvEo2BckScvObBUsIdPtdd/exec';let colaboradorNome = '';
let itensTemp = [];

// Aguarda o carregamento da página
document.addEventListener('DOMContentLoaded', function() {
    console.log('=== PÁGINA CARREGADA ===');
    
    // Tenta recuperar os dados do localStorage
    colaboradorEmail = localStorage.getItem('colaborador_email');
    colaboradorNome = localStorage.getItem('colaborador_nome');
    
    console.log('Email do localStorage:', colaboradorEmail);
    console.log('Nome do localStorage:', colaboradorNome);
    
    // Se não tem email no localStorage, redireciona para o login
    if (!colaboradorEmail) {
        console.log('ERRO: Usuário não logado. Redirecionando para login...');
        alert('Você precisa fazer login primeiro!');
        window.location.href = 'login.html';
        return;
    }
    
    // Atualiza o título com o nome do colaborador
    const nomeSpan = document.getElementById('nomeColaborador');
    if (nomeSpan && colaboradorNome) {
        nomeSpan.innerText = colaboradorNome;
    } else if (nomeSpan) {
        nomeSpan.innerText = colaboradorEmail;
    }
    
    // Data de hoje
const hoje = new Date().toLocaleDateString('pt-BR').split('/').reverse().join('-');    document.getElementById('dataMovimentacao').value = hoje;
    
    // Carregar estoque
    carregarEstoque();
});

function toggleOutroItem() {
    const select = document.getElementById('itemSelect');
    const outroDiv = document.getElementById('outroItemDiv');
    const outroInput = document.getElementById('outroItemInput');
    
    if (select.value === 'outro') {
        outroDiv.style.display = 'block';
        outroInput.required = true;
    } else {
        outroDiv.style.display = 'none';
        outroInput.required = false;
        outroInput.value = '';
    }
}

function adicionarItemLista() {
    console.log('=== ADICIONAR ITEM ===');
    
    let item = document.getElementById('itemSelect').value;
    const quantidade = parseFloat(document.getElementById('quantidadeItem').value);
    const tipo = document.getElementById('tipoMovimentacao').value;
    const outroInput = document.getElementById('outroItemInput');
    
    console.log('Item selecionado:', item);
    console.log('Quantidade:', quantidade);
    console.log('Tipo:', tipo);
    
    // Se escolheu "outro", pega o valor digitado
    if (item === 'outro') {
        if (!outroInput.value.trim()) {
            alert('Digite o nome do item!');
            return;
        }
        item = outroInput.value.trim();
        console.log('Item digitado:', item);
    }
    
    // Validações
    if (!item) {
        alert('Selecione ou digite um item!');
        return;
    }
    
    if (!quantidade || quantidade <= 0) {
        alert('Informe uma quantidade válida!');
        return;
    }
    
    // Adiciona à lista
    itensTemp.push({ item, quantidade, tipo });
    console.log('Itens na lista agora:', itensTemp);
    
    atualizarListaTemp();
    
    // Limpar campos
    document.getElementById('quantidadeItem').value = '';
    document.getElementById('itemSelect').value = '';
    document.getElementById('outroItemDiv').style.display = 'none';
    document.getElementById('outroItemInput').value = '';
}

function atualizarListaTemp() {
    const container = document.getElementById('listaItensTemp');
    
    if (itensTemp.length === 0) {
        container.innerHTML = '<p style="color: #888; text-align: center;">Nenhum item adicionado</p>';
        return;
    }
    
    container.innerHTML = '';
    itensTemp.forEach((item, index) => {
        const div = document.createElement('div');
        div.className = 'item-adicionado';
        const tipoIcone = item.tipo === 'entrada' ? '➕' : '➖';
        div.innerHTML = `
            <span><strong>${item.item}</strong> ${tipoIcone} ${item.quantidade}</span>
            <button class="btn-remover" onclick="removerItemTemp(${index})">Remover</button>
        `;
        container.appendChild(div);
    });
}

function removerItemTemp(index) {
    itensTemp.splice(index, 1);
    atualizarListaTemp();
}

async function enviarMovimentacao() {
    const data = document.getElementById('dataMovimentacao').value;
    
    if (!data) {
        alert('Selecione uma data!');
        return;
    }
    
    if (itensTemp.length === 0) {
        alert('Adicione pelo menos um item!');
        return;
    }
    
    const movimentacao = {
        data: data,
        colaborador: colaboradorEmail,
        itens: itensTemp
    };
    
    const url = `${API_URL}?acao=movimentacao&dados=${encodeURIComponent(JSON.stringify(movimentacao))}`;
    
    console.log('Enviando para URL:', url);
    
    try {
        const resposta = await fetch(url);
        const dados = await resposta.json();
        
        console.log('Resposta:', dados);
        
        if (dados.sucesso) {
            alert('✅ Movimentação registrada com sucesso!');
            itensTemp = [];
            atualizarListaTemp();
            carregarEstoque();
        } else {
            alert('Erro: ' + (dados.erro || dados.mensagem || 'Erro desconhecido'));
        }
    } catch (erro) {
        console.error('ERRO:', erro);
        alert('Erro de conexão: ' + erro.message);
    }
}

async function carregarEstoque() {
    console.log('Carregando estoque...');
    
    try {
        const url = `${API_URL}?acao=estoque`;
        console.log('URL estoque:', url);
        
        const resposta = await fetch(url);
        const dados = await resposta.json();
        
        console.log('Resposta estoque:', dados);
        
        const tbody = document.getElementById('estoqueBody');
        
        if (dados.estoque && Object.keys(dados.estoque).length > 0) {
            tbody.innerHTML = '';
            for (const [item, quantidade] of Object.entries(dados.estoque)) {
                const row = tbody.insertRow();
                row.insertCell(0).innerHTML = `<strong>${item}</strong>`;
                const qtdCell = row.insertCell(1);
                qtdCell.innerHTML = quantidade > 0 ? `${quantidade}` : `<span class="quantidade-zero">${quantidade}</span>`;
                if (quantidade <= 0) {
                    qtdCell.style.color = '#999';
                } else {
                    qtdCell.style.fontWeight = 'bold';
                    qtdCell.style.color = '#28a745';
                }
            }
        } else {
            tbody.innerHTML = '<tr><td colspan="2">Nenhum item em estoque</td></tr>';
        }
    } catch (erro) {
        console.error('Erro ao carregar estoque:', erro);
        const tbody = document.getElementById('estoqueBody');
        tbody.innerHTML = '<tr><td colspan="2">Erro ao carregar: ' + erro.message + '</td></tr>';
    }
}

function logout() {
    localStorage.removeItem('colaborador_email');
    localStorage.removeItem('colaborador_nome');
    window.location.href = 'login.html';
}
</script>

</body>
</html>
